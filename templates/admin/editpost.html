<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h1>ADD/EDIT POSTS</h1>
    <form class="addEdit" method="post">
  <div class="row mb-3">
    <label class="col-sm-2 col-form-label">Title</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" name="title" placeholder="Enter title" value="{{post.title}}">
    </div>
  </div>
  <div class="row mb-3">
    <label class="col-sm-2 col-form-label">Subtitle</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" name="subtitle" placeholder="Enter subtitle" value="{{post.subtitle}}">
    </div>
  </div>
  <div class="row mb-3">
    <label class="col-sm-2 col-form-label">Location</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" name="location" placeholder="Enter location" value="{{post.location}}">
    </div>
  </div>
  <div class="row mb-3">
    <label class="col-sm-2 col-form-label">Author</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" name="author" placeholder="Enter author" value="{{post.author}}">
    </div>
  </div>
  <div class="row mb-3">
    <label class="col-sm-2 col-form-label">Date</label>
    <div class="col-sm-10">
      <input type="date" class="form-control" name="date" value="{{post.date}}">
    </div>
  </div>
  <div class="row mb-3">
    <label class="col-sm-2 col-form-label">Image</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" name="image" placeholder="Enter image url" value="{{post.image}}">
    </div>
  </div>
  <div class="row mb-3">
    <label class="col-sm-2 col-form-label">Content_1</label>
    <div class="col-sm-10">
      <textarea class="form-control" name="content_1">{{post.content_1}}</textarea>
    </div>
  </div>
  <div class="row mb-3">
    <label class="col-sm-2 col-form-label">Content_2</label>
    <div class="col-sm-10">
      <textarea class="form-control" name="content_2">{{post.content_2}}</textarea>
    </div>
  </div>
  <div class="row mb-3">
    <label class="col-sm-2 col-form-label">Slug</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" name="slug" placeholder="Enter slug" value="{{post.slug}}">
    </div>
  </div>

  <div class="row mb-3">
    <div class="col-sm-10 offset-sm-2">

    </div>
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
</form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
